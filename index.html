<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ยืนยันตัวตนไรเดอร์</title>
  <style>
    body { font-family: Arial; padding: 20px; text-align: center; }
    input, button {
      width: 100%;
      padding: 15px;
      margin: 10px 0;
      font-size: 18px;
    }
    button { background: green; color: white; border: none; }
  </style>
</head>
<body>

<h2>ยืนยันตัวตนไรเดอร์</h2>

<input id="phone" placeholder="กรอกเบอร์โทร">

<button onclick="sendOTP()">รับ OTP</button>

<input id="otp" placeholder="กรอก OTP">

<button onclick="verifyOTP()">ยืนยัน</button>

<p id="result"></p>

<script>
const API_URL = "YOUR_GAS_URL";

function sendOTP() {
  const phone = document.getElementById("phone").value;

  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      action: "sendOTP",
      phone: phone
    })
  })
  .then(res => res.text())
  .then(res => document.getElementById("result").innerText = res);
}

function verifyOTP() {
  const phone = document.getElementById("phone").value;
  const otp = document.getElementById("otp").value;

  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      action: "verifyOTP",
      phone: phone,
      otp: otp
    })
  })
  .then(res => res.text())
  .then(res => document.getElementById("result").innerText = res);
}
</script>

</body>
</html>
